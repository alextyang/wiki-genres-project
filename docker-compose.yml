# Development compose file. Production deployment alongside active-listener
# will reuse the same images but a different orchestration.
#
# Postgres runs on 5433 to avoid colliding with active-listener's 5432.

services:
  postgres:
    image: postgres:17-alpine
    container_name: wiki-genres-postgres
    environment:
      POSTGRES_USER: wiki_genres
      POSTGRES_PASSWORD: wiki_genres
      POSTGRES_DB: wiki_genres
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki_genres -d wiki_genres"]
      interval: 5s
      timeout: 3s
      retries: 5

