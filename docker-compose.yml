# Development compose file.
# Postgres runs on 5433 to avoid colliding with active-listener's 5432.
#
# Weekly sync (system cron):
#   0 6 * * 0  docker compose run --rm api wiki-genres sync

services:
  postgres:
    image: postgres:17-alpine
    container_name: wiki-genres-postgres
    environment:
      POSTGRES_USER: wiki_genres
      POSTGRES_PASSWORD: wiki_genres
      POSTGRES_DB: wiki_genres
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki_genres -d wiki_genres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: >
      sh -c "wiki-genres migrate && uvicorn wiki_genres.api.main:app --host 0.0.0.0 --port 8080"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://wiki_genres:wiki_genres@postgres:5432/wiki_genres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
