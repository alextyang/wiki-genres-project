name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: wiki_genres
          POSTGRES_PASSWORD: wiki_genres
          POSTGRES_DB: wiki_genres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U wiki_genres -d wiki_genres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://wiki_genres:wiki_genres@localhost:5433/wiki_genres
        run: uv run pytest --tb=short -q
